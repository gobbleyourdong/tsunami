<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tsunami</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #080810; --bg2: #0c0c18; --panel: #0e0e1c; --panel2: #12122a;
      --border: #1a1a30; --border-hi: #252550;
      --text: #c8c8d8; --muted: #4a4a6a;
      --accent: #1a8a8a; --accent-glow: #0d6868; --accent-bright: #2ab8b8;
      --green: #3da87a; --yellow: #b8a040; --red: #a83a3a;
      --blue: #4070a8; --purple: #7050a0; --orange: #a86830;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'JetBrains Mono','Cascadia Code','Fira Code','Consolas',monospace; font-size: 13px; overflow: hidden; }

    /* 2-column: left (chat+activity) | right (code/preview) */
    #app { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 36px 1fr; height: 100vh; }
    #app.preview-max { grid-template-columns: 0 1fr; }

    /* Top bar */
    .top-bar { grid-column: 1 / -1; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; gap: 12px; }
    .top-bar .logo { color: var(--accent-bright); font-weight: 700; font-size: 13px; letter-spacing: 2px; }
    .top-bar .spacer { flex: 1; }
    .top-bar .hud { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
    .dot.on { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .dot.off { background: var(--red); }

    /* LEFT: Chat + Activity */
    .left { display: flex; flex-direction: column; border-right: 1px solid var(--border); background: var(--bg2); overflow: hidden; min-height: 0; }
    .chat-msgs { flex: 1; overflow-y: auto; padding: 14px; min-height: 0; }
    .msg { margin-bottom: 8px; line-height: 1.5; animation: fadeIn 0.15s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; } }
    .msg.user { color: var(--accent-bright); font-weight: 500; }
    .msg.user::before { content: "> "; color: var(--muted); }
    .msg.agent { padding-left: 10px; border-left: 2px solid var(--accent-glow); }
    .msg.tool { color: var(--muted); font-size: 11px; padding-left: 10px; opacity: 0.7; font-family: inherit; }
    .msg.tool::before { content: "● "; color: var(--accent); }
    .msg.error { color: var(--red); font-size: 11px; }
    .msg.system { color: var(--green); font-size: 11px; }
    .msg.system::before { content: "✓ "; }
    .chat-input { display: flex; padding: 8px; gap: 6px; border-top: 1px solid var(--border); background: var(--panel); }
    .chat-input input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; color: var(--text); font-family: inherit; font-size: 13px; outline: none; }
    .chat-input input:focus { border-color: var(--accent); }
    .chat-input input::placeholder { color: var(--muted); }
    .chat-input button { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 10px 16px; font-weight: 600; cursor: pointer; font-size: 14px; }
    .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    .welcome h1 { color: var(--accent-bright); font-size: 28px; font-weight: 300; letter-spacing: 5px; text-shadow: 0 0 20px var(--accent-glow); }
    .welcome p { color: var(--muted); font-size: 12px; margin-top: 4px; }

    /* RIGHT: Tabbed (Code | Preview) */
    .right { display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
    .tabs { display: flex; background: var(--panel); border-bottom: 1px solid var(--border); min-height: 30px; align-items: center; }
    .tab { padding: 6px 14px; cursor: pointer; color: var(--muted); font-size: 11px; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent-bright); border-bottom: 2px solid var(--accent); }
    .tab-spacer { flex: 1; }
    .tab-btn { padding: 4px 10px; cursor: pointer; color: var(--muted); font-size: 11px; }
    .tab-btn:hover { color: var(--accent-bright); }

    .tab-content { flex: 1; overflow: hidden; display: flex; }

    /* Code view */
    .file-tree { width: 160px; background: var(--bg); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
    .file-tree-header { padding: 6px 8px; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); }
    .file-item { padding: 3px 6px 3px 12px; cursor: pointer; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .file-item:hover { background: var(--panel2); }
    .file-item.active { background: var(--panel2); color: var(--accent-bright); }
    .code-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .code-path { padding: 4px 10px; background: var(--panel); font-size: 11px; color: var(--muted); border-bottom: 1px solid var(--border); }
    .code-area { flex: 1; overflow: auto; padding: 10px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; }
    .code-area .ln { color: var(--muted); display: inline-block; width: 30px; text-align: right; margin-right: 10px; user-select: none; }

    /* Preview */
    .preview-wrap { width: 100%; height: 100%; }
    .preview-wrap iframe { width: 100%; height: 100%; border: none; background: #fff; }

    /* Maximized preview */
    #app.preview-max .left { display: none; }
    #app.preview-max .right { border: none; }

    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top-bar">
      <span class="logo">TSUNAMI</span>
      <span class="spacer"></span>
      <div class="hud">
        <span id="hud-text">idle</span>
        wave <div class="dot" id="wave-dot"></div>
        eddy <div class="dot" id="eddy-dot"></div>
      </div>
    </div>

    <!-- LEFT: Chat + Activity -->
    <div class="left">
      <div class="chat-msgs" id="chat-msgs">
        <div class="welcome">
          <pre style="color:var(--accent-bright);font-size:11px;line-height:1.2;text-shadow:0 0 10px var(--accent-glow)">
▀▛▘▞▀▖▌ ▌▙ ▌▞▀▖▙▗▌▜▘
 ▌ ▚▄ ▌ ▌▌▌▌▙▄▌▌▘▌▐
 ▌ ▖ ▌▌ ▌▌▝▌▌ ▌▌ ▌▐
 ▘ ▝▀ ▝▀ ▘ ▘▘ ▘▘ ▘▀▘</pre>
          <p style="color:var(--muted);font-size:11px;margin-top:8px">what do you want to build?</p>
        </div>
      </div>
      <div class="chat-input">
        <input id="prompt" placeholder="build me a..." onkeydown="if(event.key==='Enter')send()" autofocus />
        <button onclick="send()">→</button>
      </div>
    </div>

    <!-- RIGHT: Tabbed Code/Preview -->
    <div class="right">
      <div class="tabs">
        <div class="tab active" onclick="showTab('code',this)">Code</div>
        <div class="tab" onclick="showTab('preview',this)">Output</div>
        <div class="tab-spacer"></div>
        <div class="tab-btn" id="max-btn" onclick="toggleMax()">⤢</div>
      </div>
      <div class="tab-content" id="tab-content">
        <div class="file-tree">
          <div class="file-tree-header">Files</div>
          <div id="file-list"></div>
        </div>
        <div class="code-pane">
          <div class="code-path" id="code-path">no file selected</div>
          <div class="code-area" id="code-area"><span style="color:var(--muted)">select a file</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WS_AGENT = "ws://localhost:3002"
    const WS_FILES = "ws://localhost:3003"
    let ws = null, fileWs = null
    let messages = [], fileList = [], codeContent = "", currentFile = ""
    let currentTab = "code", isMaximized = false

    // === AGENT CONNECTION ===
    function connectAgent() {
      ws = new WebSocket(WS_AGENT)
      ws.onopen = () => updateDots()
      ws.onclose = () => { updateDots(); setTimeout(connectAgent, 3000) }
      ws.onmessage = e => {
        try { handleMsg(JSON.parse(e.data)) } catch { addChat("agent", e.data) }
      }
    }

    function handleMsg(d) {
      if (d.type === "tool_call") {
        addChat("tool", `${toolLabel(d.name)}(${d.preview || ""})`)
        setHud(toolLabel(d.name))
        if (d.content && d.path) { codeContent = d.content; currentFile = d.path; renderCode(); renderFiles() }
      } else if (d.type === "message") {
        addChat("agent", d.text)
      } else if (d.type === "error") {
        addChat("error", d.text)
      } else if (d.type === "complete") {
        addChat("system", `done in ${d.iterations} iterations`)
        setHud("done", false)
      }
    }

    // === FILE WATCHER ===
    function connectFiles() {
      fileWs = new WebSocket(WS_FILES)
      fileWs.onclose = () => setTimeout(connectFiles, 3000)
      fileWs.onmessage = e => {
        try {
          const d = JSON.parse(e.data)
          if (d.type === "files") { fileList = d.files; renderFiles() }
          if (d.type === "file_changed") {
            codeContent = d.content; currentFile = d.path
            renderCode(); renderFiles()
          }
        } catch {}
      }
    }

    // === CHAT ===
    function send() {
      const input = document.getElementById("prompt")
      const text = input.value.trim()
      if (!text) return
      addChat("user", text)
      input.value = ""
      if (ws?.readyState === 1) { ws.send(JSON.stringify({ type: "prompt", text })); setHud("starting...") }
      else addChat("error", "not connected")
    }

    let lastText = ""
    function addChat(type, text) {
      if (type !== "user" && text === lastText) return
      lastText = text
      messages.push({ type, text })
      const el = document.getElementById("chat-msgs")
      const w = el.querySelector(".welcome"); if (w) w.remove()
      const div = document.createElement("div")
      div.className = `msg ${type}`
      div.textContent = text
      el.appendChild(div)
      el.scrollTop = el.scrollHeight
    }

    // === TABS ===
    function showTab(name, tab) {
      currentTab = name
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"))
      if (tab) tab.classList.add("active")
      const c = document.getElementById("tab-content")
      if (name === "code") {
        c.innerHTML = `
          <div class="file-tree"><div class="file-tree-header">Files</div><div id="file-list"></div></div>
          <div class="code-pane">
            <div class="code-path" id="code-path">${esc(currentFile || "no file")}</div>
            <div class="code-area" id="code-area"></div>
          </div>`
        renderCode(); renderFiles()
      } else if (name === "preview") {
        c.innerHTML = '<div class="preview-wrap"><iframe src="http://localhost:9876"></iframe></div>'
      }
    }

    function toggleMax() {
      isMaximized = !isMaximized
      document.getElementById("app").classList.toggle("preview-max", isMaximized)
      document.getElementById("max-btn").textContent = isMaximized ? "⤡" : "⤢"
      if (isMaximized && currentTab !== "preview") {
        showTab("preview", document.querySelectorAll(".tab")[1])
      }
    }

    // === CODE ===
    function renderCode() {
      if (currentTab !== "code") return
      const path = document.getElementById("code-path")
      const area = document.getElementById("code-area")
      if (!path || !area) return
      path.textContent = currentFile || "no file"
      if (!codeContent) { area.innerHTML = '<span style="color:var(--muted)">select a file</span>'; return }
      area.innerHTML = codeContent.split("\n").map((line, i) =>
        `<div><span class="ln">${i + 1}</span>${esc(line)}</div>`
      ).join("")
    }

    function renderFiles() {
      const el = document.getElementById("file-list")
      if (!el) return
      if (!fileList.length) { el.innerHTML = '<div style="padding:8px;color:var(--muted)">no files yet</div>'; return }
      const colors = { tsx: "var(--blue)", ts: "var(--green)", css: "var(--purple)", json: "var(--orange)", html: "var(--red)", js: "var(--yellow)", py: "var(--green)", md: "var(--muted)" }
      el.innerHTML = fileList.slice(0, 80).map(f => {
        const name = f.split("/").pop()
        const ext = name.split(".").pop()
        const c = colors[ext] || "var(--muted)"
        const active = f === currentFile ? " active" : ""
        return `<div class="file-item${active}" onclick="selectFile('${esc(f)}')"><span style="color:${c};font-size:9px">●</span>${esc(name)}</div>`
      }).join("")
    }

    function selectFile(path) {
      currentFile = path
      if (fileWs?.readyState === 1) fileWs.send(JSON.stringify({ type: "read", path }))
      renderFiles()
    }

    // === HUD ===
    function setHud(text, active = true) {
      document.getElementById("hud-text").textContent = active ? text : "idle"
    }
    function toolLabel(n) {
      return { file_write:"Write", file_edit:"Edit", file_read:"Read", shell_exec:"Run", search_web:"Search", project_init:"Init", swell:"Swell", undertow:"Test", generate_image:"Generate", plan_update:"Plan", message_info:"Info", message_result:"Result", match_glob:"Glob", match_grep:"Grep", python_exec:"Python", summarize_file:"Summarize" }[n] || n
    }

    // === HEALTH ===
    function updateDots() {
      document.getElementById("wave-dot").className = "dot " + (ws?.readyState === 1 ? "on" : "off")
    }
    async function checkHealth() {
      for (const [id, port] of [["wave-dot", 8090], ["eddy-dot", 8092]]) {
        try { const r = await fetch(`http://localhost:${port}/health`, {signal: AbortSignal.timeout(2000)}); document.getElementById(id).className = "dot " + (r.ok ? "on" : "off") }
        catch { document.getElementById(id).className = "dot off" }
      }
    }

    function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML }

    // === INIT ===
    connectAgent()
    connectFiles()
    checkHealth()
    setInterval(checkHealth, 5000)
  </script>
</body>
</html>
