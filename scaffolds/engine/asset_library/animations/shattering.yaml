primitive: shattering
category: vfx
frame_count: 6
reversible: true
base_hint: >
  rigid solid object — crystal, glass, pottery, skull, statue, ice
  block — where fracture propagation from surface cracks to full
  fragmentation reads as physical destruction
guidance: >
  Destruction chain. REVERSIBLE — played in reverse, the same
  primitive is an "assembling" / "forming" animation (fragments
  converge into whole). Critical property: chain each nudge from
  the PREVIOUS frame so the fracture network evolves coherently;
  star-pattern editing would give you 6 unrelated fragment patterns.

nudges:
  - delta: "hairline cracks appearing across the surface, faint
      internal stress"
    strength: 0.25
  - delta: "cracks deepen and branch, small chips starting to flake
      off the edges"
    strength: 0.3
  - delta: "fragments visibly separating, interior structure exposed,
      first chunks falling away"
    strength: 0.4
  - delta: "larger pieces detaching, dust cloud forming, outline
      breaking down"
    strength: 0.45
  - delta: "mostly fragmented, scattered chunks mid-fall, dust cloud
      expanding outward"
    strength: 0.5
  - delta: "only small shards and dust remain where the object was,
      silhouette gone"
    strength: 0.5
