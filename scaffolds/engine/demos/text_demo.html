<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsunami Engine — Sample Newton Text Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f14; color: #ccc; font-family: monospace; overflow: hidden; }
    canvas { width: 100vw; height: 100vh; display: block; }
    #stats {
      position: fixed; top: 12px; right: 12px;
      background: rgba(0,0,0,0.7); padding: 10px 14px; border-radius: 4px;
      font-size: 12px; line-height: 1.5; z-index: 10;
      white-space: pre; max-width: 360px;
    }
    #error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #1a0000; border: 1px solid #660000; padding: 24px; border-radius: 8px;
      max-width: 560px; display: none; text-align: left;
      font-size: 13px; line-height: 1.5;
    }
    #error h3 { color: #ff8080; margin-bottom: 8px; }
    #error code { background: rgba(255,255,255,0.08); padding: 1px 4px; border-radius: 2px; }
    #error pre {
      background: rgba(255,255,255,0.06); padding: 10px 12px; border-radius: 4px;
      margin: 10px 0; overflow-x: auto; font-size: 12px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="stats"></div>
  <div id="error"></div>
  <script type="module" src="./text_demo.ts"></script>
</body>
</html>
