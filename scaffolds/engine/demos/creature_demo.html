<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsunami Engine — Creature Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0a0a0f; color: #ccc;
      font-family: monospace; overflow: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; }
    canvas {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    #stats {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      font-size: 13px; line-height: 1.6; z-index: 10; white-space: pre;
    }
    #props {
      position: fixed; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); padding: 8px 10px; border-radius: 4px;
      color: #cde; font-size: 11px; z-index: 10;
      min-width: 220px;
      max-height: calc(100vh - 12px);
      overflow-y: auto;
    }
    #props h3 { margin: 0 0 6px; font-size: 12px; color: #fc4; font-weight: normal; }
    #props label { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    #props input[type="range"] { flex: 1; }
    #props .val { display: inline-block; width: 36px; text-align: right; color: #9cf; }
    #props button { background: #1a2b4a; color: #cde; border: 1px solid #345; padding: 4px 8px; font-size: 11px; cursor: pointer; border-radius: 3px; margin: 2px; }
    #props button:hover { background: #263a5c; }
    #props button.active { background: #2a4070; border-color: #468; }
    #props hr { border: 0; border-top: 1px solid #233; margin: 8px 0 4px; }
    #error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #1a0000; border: 1px solid #660000; padding: 24px; border-radius: 8px;
      max-width: 500px; display: none; text-align: center;
    }
  </style>
</head>
<body>
  <!-- Pixel buffer is sprite-sized (sz48); CSS image-rendering:
       pixelated scales it up to the viewport. Matches the skeleton
       demo's sz48 / "res 3" sprite cell. -->
  <canvas id="canvas" width="48" height="80"></canvas>
  <div id="stats"></div>
  <div id="props">
    <h3>Creature</h3>
    <div id="presets"></div>
    <hr>
    <div id="dials"></div>
  </div>
  <div id="error"></div>
  <script type="module" src="./creature_demo.ts"></script>
</body>
</html>
