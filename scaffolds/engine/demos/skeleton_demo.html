<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tsunami Engine — Skeleton Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #0a0a0f; color: #ccc;
      font-family: monospace; overflow: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; }
    /* Canvas pixel buffer is set per mode (16×24, 32×32, 48×80, 256×224).
       CSS fills as much of the window as possible while preserving aspect.
       Pixelated upscale keeps each rendered pixel as a sharp block. */
    canvas {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      display: block;
    }
    #stats {
      position: fixed; top: 12px; left: 12px;
      background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px;
      font-size: 13px; line-height: 1.6; z-index: 10; white-space: pre;
    }
    #props {
      position: fixed; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); padding: 6px 8px; border-radius: 4px;
      color: #cde; font-size: 11px; z-index: 10;
      min-width: 220px;
      max-height: calc(100vh - 12px);
      overflow: hidden;
    }
    #props h3 { margin: 0 0 4px; font-size: 12px; color: #fc4; font-weight: normal; }
    #props label { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-family: monospace; }
    #props .lbl { display: inline-block; width: 54px; }
    #props .val { display: inline-block; width: 32px; text-align: right; color: #9cf; }
    #props input[type="range"] { flex: 1; height: 14px; }
    #props input[type="color"] { width: 28px; height: 14px; border: 1px solid #334; background: transparent; padding: 0; cursor: pointer; }
    #props button { margin-top: 4px; background: #1a2b4a; color: #cde; border: 1px solid #345; padding: 2px 6px; font-size: 10px; cursor: pointer; border-radius: 3px; }
    #props button:hover { background: #263a5c; }
    #props hr { border: 0; border-top: 1px solid #233; margin: 4px 0 2px; }
    #props .palette-row { display: flex; align-items: center; gap: 6px; margin: 2px 0; font-family: monospace; font-size: 10px; }
    #props .palette-row .slot-lbl { width: 64px; color: #9ab; }
    #error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #1a0000; border: 1px solid #660000; padding: 24px; border-radius: 8px;
      max-width: 500px; display: none; text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="256" height="224"></canvas>
  <div id="stats"></div>
  <div id="props">
    <h3>Character</h3>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">resolution</div>
    <div style="font-size: 11px; color: #9ab; margin-bottom: 6px;">
      1 · 24² (Zelda / sm. Mario) &nbsp; 2 · 32² (lg. Mario) &nbsp; 3 · 48² (CT / Alucard) &nbsp; 4 · 128² (debug)
    </div>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">proportion</div>
    <div style="display: flex; gap: 4px; flex-wrap: wrap;">
      <button id="preset-chibi">chibi</button>
      <button id="preset-stylized">stylized</button>
      <button id="preset-realistic">realistic</button>
    </div>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">loadout</div>
    <div id="loadout-panel" style="display: flex; flex-direction: column; gap: 4px;"></div>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">cape length</div>
    <label style="display: flex; align-items: center; gap: 6px; margin: 2px 0;">
      <input type="range" id="cape-length" min="0.3" max="5.0" step="0.05" value="1.0" style="flex: 1;">
      <span class="val" id="cape-length-val">1.00</span>
    </label>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">hair length</div>
    <label style="display: flex; align-items: center; gap: 6px; margin: 2px 0;">
      <input type="range" id="hair-length" min="0.3" max="3.0" step="0.05" value="1.0" style="flex: 1;">
      <span class="val" id="hair-length-val">1.00</span>
    </label>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">tail length</div>
    <label style="display: flex; align-items: center; gap: 6px; margin: 2px 0;">
      <input type="range" id="tail-length" min="0.3" max="3.0" step="0.05" value="1.0" style="flex: 1;">
      <span class="val" id="tail-length-val">1.00</span>
    </label>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">strand length</div>
    <label style="display: flex; align-items: center; gap: 6px; margin: 2px 0;">
      <input type="range" id="strand-length" min="0.3" max="3.0" step="0.05" value="1.0" style="flex: 1;">
      <span class="val" id="strand-length-val">1.00</span>
    </label>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">spike scale</div>
    <label style="display: flex; align-items: center; gap: 6px; margin: 2px 0;">
      <input type="range" id="spike-scale" min="0.5" max="2.5" step="0.05" value="1.0" style="flex: 1;">
      <span class="val" id="spike-scale-val">1.00</span>
    </label>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">expression</div>
    <div id="expression-row" style="display: flex; gap: 4px; flex-wrap: wrap;"></div>
    <hr>
    <div id="palette-list"></div>
    <hr>
    <div style="font-size: 10px; color: #9ab; margin-bottom: 2px;">face pixels</div>
    <div id="face-pixel-editor" style="font-size: 10px;"></div>
    <hr>
    <div style="display: flex; gap: 6px; flex-wrap: wrap;">
      <button id="save-char">save character</button>
      <button id="load-char">load character</button>
      <input type="file" id="load-char-file" accept=".json" style="display:none">
    </div>
    <input id="char-name" type="text" value="unnamed" placeholder="character name" style="width:100%; margin-top:6px; background:#111; color:#cde; border:1px solid #334; padding:3px 6px; font-family:monospace; font-size:11px;">
  </div>
  <div id="error"></div>
  <script type="module" src="./skeleton_demo.ts"></script>
</body>
</html>
