<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oakvale Level Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; display: flex; height: 100vh; }
    #sidebar {
      width: 220px; background: #16213e; padding: 12px; overflow-y: auto;
      border-right: 1px solid #333;
    }
    #sidebar h2 { font-size: 14px; color: #4a9eff; margin: 12px 0 6px; }
    #sidebar h2:first-child { margin-top: 0; }
    .tool-btn {
      display: block; width: 100%; padding: 6px 8px; margin: 2px 0;
      background: #0f3460; border: 1px solid #333; color: #ccc; cursor: pointer;
      font-family: inherit; font-size: 11px; text-align: left; border-radius: 3px;
    }
    .tool-btn:hover { background: #1a4a80; }
    .tool-btn.active { background: #4a9eff; color: #000; border-color: #4a9eff; }
    #canvas-wrap { flex: 1; overflow: auto; position: relative; }
    canvas { cursor: crosshair; display: block; }
    #toolbar {
      position: fixed; bottom: 0; left: 220px; right: 0; height: 36px;
      background: #16213e; border-top: 1px solid #333; display: flex;
      align-items: center; padding: 0 12px; gap: 8px; font-size: 12px;
    }
    #toolbar button {
      padding: 4px 12px; background: #0f3460; border: 1px solid #444;
      color: #ccc; cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 11px;
    }
    #toolbar button:hover { background: #1a4a80; }
    #toolbar .info { color: #888; margin-left: auto; }
  </style>
</head>
<body>
  <div id="sidebar">
    <h2>Tiles</h2>
    <div id="tile-buttons"></div>
    <h2>Props</h2>
    <div id="prop-buttons"></div>
    <h2>NPCs</h2>
    <div id="npc-buttons"></div>
    <h2>Tools</h2>
    <button class="tool-btn" onclick="setTool('erase')">Eraser</button>
    <button class="tool-btn" onclick="setTool('player')">Set Player Start</button>
    <button class="tool-btn" onclick="setTool('exit')">Add Exit</button>
  </div>
  <div id="canvas-wrap">
    <canvas id="editor"></canvas>
  </div>
  <div id="toolbar">
    <button onclick="exportMap()">Export JSON</button>
    <button onclick="importMap()">Import JSON</button>
    <button onclick="clearMap()">Clear</button>
    <button onclick="generateFromPrompt()">Generate from Text</button>
    <button onclick="playMap()" style="background:#1a5a1a;border-color:#2a8a2a">Play Map</button>
    <span class="info" id="status">24x18 | Tool: grass</span>
  </div>

  <script type="module">
    const TILES = ['grass', 'darkgrass', 'flowers', 'path', 'stone', 'water', 'sand', 'lava', 'wood']
    const TILE_COLORS = {
      grass: '#2d5a1e', darkgrass: '#1a3a10', flowers: '#3d7a2e',
      path: '#8a7a5a', stone: '#6a6a6a', water: '#2a4a8a',
      sand: '#c4a84a', lava: '#aa3300', wood: '#6a4a2a',
    }
    const PROPS = ['prop_house', 'prop_tree', 'prop_rock', 'prop_well']
    const PROP_COLORS = { prop_house: '#8a6a3a', prop_tree: '#1a5a1a', prop_rock: '#666', prop_well: '#4a7aaa' }
    const NPCS = [
      { id: 'elder', sprite: 'npc_elder', name: 'Elder', color: '#4488cc' },
      { id: 'merchant', sprite: 'npc_merchant', name: 'Merchant', color: '#cc8844' },
      { id: 'guard', sprite: 'npc_guard', name: 'Guard', color: '#44cc44' },
      { id: 'wolf', sprite: 'rpg_wolf', name: 'Wolf', color: '#cc4444', hostile: true },
      { id: 'spider', sprite: 'rpg_spider', name: 'Spider', color: '#884488', hostile: true },
    ]

    const W = 24, H = 18, TS = 28
    let currentTool = 'grass'
    let toolType = 'tile' // tile, prop, npc, erase, player, exit

    // Map data
    const ground = Array.from({ length: H }, () => Array(W).fill('grass'))
    const props = []
    const npcs = []
    let playerStart = [12, 10]
    const exits = []

    // Canvas
    const canvas = document.getElementById('editor')
    const ctx = canvas.getContext('2d')
    canvas.width = W * TS
    canvas.height = H * TS

    // Build UI buttons
    const tileDiv = document.getElementById('tile-buttons')
    for (const t of TILES) {
      const btn = document.createElement('button')
      btn.className = 'tool-btn'
      btn.textContent = t
      btn.style.borderLeft = `4px solid ${TILE_COLORS[t]}`
      btn.onclick = () => { currentTool = t; toolType = 'tile'; updateActive() }
      tileDiv.appendChild(btn)
    }

    const propDiv = document.getElementById('prop-buttons')
    for (const p of PROPS) {
      const btn = document.createElement('button')
      btn.className = 'tool-btn'
      btn.textContent = p.replace('prop_', '')
      btn.style.borderLeft = `4px solid ${PROP_COLORS[p]}`
      btn.onclick = () => { currentTool = p; toolType = 'prop'; updateActive() }
      propDiv.appendChild(btn)
    }

    const npcDiv = document.getElementById('npc-buttons')
    for (const n of NPCS) {
      const btn = document.createElement('button')
      btn.className = 'tool-btn'
      btn.textContent = `${n.name}${n.hostile ? ' ⚔' : ''}`
      btn.style.borderLeft = `4px solid ${n.color}`
      btn.onclick = () => { currentTool = n.id; toolType = 'npc'; updateActive() }
      npcDiv.appendChild(btn)
    }

    function updateActive() {
      document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'))
      document.getElementById('status').textContent = `${W}x${H} | Tool: ${currentTool}`
    }

    // Expose to global for onclick handlers
    window.setTool = (tool) => { currentTool = tool; toolType = tool; updateActive() }

    // Drawing
    let painting = false
    canvas.addEventListener('mousedown', (e) => { painting = true; paint(e) })
    canvas.addEventListener('mousemove', (e) => { if (painting) paint(e) })
    canvas.addEventListener('mouseup', () => painting = false)
    canvas.addEventListener('mouseleave', () => painting = false)

    function paint(e) {
      const rect = canvas.getBoundingClientRect()
      const tx = Math.floor((e.clientX - rect.left) / TS)
      const ty = Math.floor((e.clientY - rect.top) / TS)
      if (tx < 0 || ty < 0 || tx >= W || ty >= H) return

      if (toolType === 'tile') {
        ground[ty][tx] = currentTool
      } else if (toolType === 'prop') {
        // Remove existing prop at this tile
        const idx = props.findIndex(p => Math.floor(p.x) === tx && Math.floor(p.y) === ty)
        if (idx >= 0) props.splice(idx, 1)
        props.push({ type: currentTool, x: tx, y: ty, solid: true })
      } else if (toolType === 'npc') {
        const template = NPCS.find(n => n.id === currentTool)
        if (template) {
          const id = `${currentTool}_${Date.now()}`
          npcs.push({
            id, name: template.name, sprite: template.sprite,
            x: tx, y: ty, hostile: !!template.hostile,
            dialog: template.hostile ? [] : [`Hello, I am ${template.name}.`],
          })
        }
      } else if (toolType === 'erase') {
        ground[ty][tx] = 'grass'
        const pi = props.findIndex(p => Math.floor(p.x) === tx && Math.floor(p.y) === ty)
        if (pi >= 0) props.splice(pi, 1)
        const ni = npcs.findIndex(n => Math.floor(n.x) === tx && Math.floor(n.y) === ty)
        if (ni >= 0) npcs.splice(ni, 1)
      } else if (toolType === 'player') {
        playerStart = [tx, ty]
      } else if (toolType === 'exit') {
        const target = prompt('Exit target map name:')
        if (target) exits.push({ x: tx, y: ty, target, spawnX: 12, spawnY: 16 })
      }

      render()
    }

    function render() {
      ctx.fillStyle = '#0a0a12'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      // Tiles
      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          ctx.fillStyle = TILE_COLORS[ground[y][x]] || '#333'
          ctx.fillRect(x * TS, y * TS, TS - 1, TS - 1)
        }
      }

      // Props
      for (const p of props) {
        ctx.fillStyle = PROP_COLORS[p.type] || '#888'
        const size = p.type === 'prop_house' ? TS * 0.9 : TS * 0.6
        ctx.fillRect(p.x * TS + (TS - size) / 2, p.y * TS + (TS - size) / 2, size, size)
        ctx.fillStyle = '#fff'
        ctx.font = '8px monospace'
        ctx.textAlign = 'center'
        ctx.fillText(p.type.replace('prop_', '')[0].toUpperCase(), p.x * TS + TS / 2, p.y * TS + TS / 2 + 3)
        ctx.textAlign = 'left'
      }

      // NPCs
      for (const n of npcs) {
        const tmpl = NPCS.find(t => t.sprite === n.sprite) || NPCS[0]
        ctx.fillStyle = tmpl.color
        ctx.beginPath()
        ctx.arc(n.x * TS + TS / 2, n.y * TS + TS / 2, TS * 0.35, 0, Math.PI * 2)
        ctx.fill()
        ctx.fillStyle = '#fff'
        ctx.font = '8px monospace'
        ctx.textAlign = 'center'
        ctx.fillText(n.name[0], n.x * TS + TS / 2, n.y * TS + TS / 2 + 3)
        ctx.textAlign = 'left'
      }

      // Player start
      ctx.strokeStyle = '#00ff88'
      ctx.lineWidth = 2
      ctx.strokeRect(playerStart[0] * TS + 2, playerStart[1] * TS + 2, TS - 4, TS - 4)
      ctx.fillStyle = '#00ff88'
      ctx.font = '9px monospace'
      ctx.fillText('P', playerStart[0] * TS + TS / 2 - 3, playerStart[1] * TS + TS / 2 + 3)

      // Exits
      for (const ex of exits) {
        ctx.strokeStyle = '#ff00ff'
        ctx.lineWidth = 2
        ctx.strokeRect(ex.x * TS + 2, ex.y * TS + 2, TS - 4, TS - 4)
        ctx.fillStyle = '#ff00ff'
        ctx.font = '7px monospace'
        ctx.fillText('→' + ex.target[0], ex.x * TS + 4, ex.y * TS + TS / 2 + 2)
      }
    }

    window.exportMap = () => {
      const map = {
        name: prompt('Map name:') || 'Untitled',
        width: W, height: H, tileSize: 32,
        layers: { ground },
        props, npcs, playerStart, exits,
      }
      const blob = new Blob([JSON.stringify(map, null, 2)], { type: 'application/json' })
      const url = URL.createObjectURL(blob)
      const a = document.createElement('a')
      a.href = url; a.download = `${map.name.toLowerCase().replace(/\s+/g, '_')}.json`
      a.click(); URL.revokeObjectURL(url)
    }

    window.importMap = () => {
      const input = document.createElement('input')
      input.type = 'file'; input.accept = '.json'
      input.onchange = async () => {
        const file = input.files[0]
        if (!file) return
        const text = await file.text()
        const map = JSON.parse(text)
        // Load into editor
        for (let y = 0; y < H && y < map.height; y++)
          for (let x = 0; x < W && x < map.width; x++)
            ground[y][x] = map.layers.ground[y]?.[x] || 'grass'
        props.length = 0; props.push(...(map.props || []))
        npcs.length = 0; npcs.push(...(map.npcs || []))
        playerStart[0] = map.playerStart?.[0] ?? 12
        playerStart[1] = map.playerStart?.[1] ?? 10
        exits.length = 0; exits.push(...(map.exits || []))
        render()
      }
      input.click()
    }

    window.clearMap = () => {
      if (!confirm('Clear entire map?')) return
      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) ground[y][x] = 'grass'
      props.length = 0; npcs.length = 0; exits.length = 0
      playerStart[0] = 12; playerStart[1] = 10
      render()
    }

    window.generateFromPrompt = async () => {
      const desc = prompt('Describe the map:')
      if (!desc) return
      // Call tilemap_gen via fetch to a local server, or generate client-side
      // For now: simple client-side generation matching tilemap_gen.py logic
      const words = desc.toLowerCase()
      const biome = words.includes('forest') ? 'darkgrass' : words.includes('desert') ? 'sand'
        : words.includes('dungeon') ? 'stone' : words.includes('lava') ? 'stone' : 'grass'

      for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
        if (x < 2 || x >= W-2 || y < 2 || y >= H-2) ground[y][x] = biome === 'grass' ? 'darkgrass' : biome
        else ground[y][x] = biome
      }

      // Path through center
      if (words.includes('path') || words.includes('village') || words.includes('road')) {
        for (let x = 3; x < W-3; x++) { ground[H>>1][x] = 'path'; ground[(H>>1)+1][x] = 'path' }
        for (let y = 4; y < H-4; y++) ground[y][W>>1] = 'path'
      }

      // Water
      if (words.includes('river') || words.includes('lake') || words.includes('water') || words.includes('oasis')) {
        const wx = 4 + Math.floor(Math.random() * (W-10))
        const wy = H-6 + Math.floor(Math.random() * 3)
        for (let dy = 0; dy < 3; dy++) for (let dx = 0; dx < 4; dx++)
          if (wy+dy < H-2 && wx+dx < W-2) ground[wy+dy][wx+dx] = 'water'
      }

      props.length = 0; npcs.length = 0
      // Houses
      const houseMatch = desc.match(/(\d+)\s*house/)
      const houseCount = houseMatch ? parseInt(houseMatch[1]) : (words.includes('house') || words.includes('village') ? 2 : 0)
      for (let i = 0; i < houseCount; i++)
        props.push({ type: 'prop_house', x: 5 + i * 5, y: 4, solid: true })

      // Trees
      if (words.includes('tree') || words.includes('forest')) {
        for (let i = 0; i < 8; i++)
          props.push({ type: 'prop_tree', x: 2+Math.floor(Math.random()*(W-4)), y: 2+Math.floor(Math.random()*(H-4)), solid: true })
      }

      render()
      document.getElementById('status').textContent = `Generated: ${desc.substring(0, 30)}`
    }

    window.playMap = () => {
      const map = {
        name: 'Editor Map', width: W, height: H, tileSize: 32,
        layers: { ground }, props, npcs, playerStart, exits,
      }
      // Store in sessionStorage and open RPG with flag
      sessionStorage.setItem('editorMap', JSON.stringify(map))
      window.open('/rpg.html?map=editor', '_blank')
    }

    // Initial render
    render()
  </script>
</body>
</html>
