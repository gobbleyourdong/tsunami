# tsunami — the tide rises
# Configuration for the Resonant Ark

# --- Model (serve_transformers.py) ---
model_backend: api
model_name: "tsunami"
model_endpoint: "http://localhost:8090"
temperature: 0.8  # Middle ground: 1.0 sprawls (358-line → truncate → read spiral), 0.6 over-explores (pure read spiral, never writes). 0.8 keeps confidence to commit while reducing variance.
max_tokens: 12288  # v23 hit 8192 ceiling at line 640 (639-line App.tsx from shadcn_startup + full brief). Doctrine bodies can push the system prompt to 8-10K tokens; drone outputs 700+ line App.tsx for complex 3-page sites. 12288 covers the observed worst-case; total budget ≈16-18K → bucket 16384 catches most cases, bucket 32768 the overflow (cold-capture on first hit).

# --- Eddies (same endpoint) ---
eddy_endpoint: "http://localhost:8090"

# --- Watcher ---
watcher_enabled: false
watcher_model: "tsunami"
watcher_endpoint: "http://localhost:8090"
watcher_interval: 3

# --- Paths ---
workspace_dir: "./workspace"
skills_dir: "./skills"

# --- Behavior ---
max_iterations: 50
tool_timeout: 120
error_escalation_threshold: 3
watcher_interval: 5

# --- Search ---
search_backend: duckduckgo

# --- Browser ---
browser_headless: true
