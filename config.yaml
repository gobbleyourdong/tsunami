# tsunami — the tide rises
# Configuration for the Resonant Ark

# --- Model (serve_transformers.py) ---
model_backend: api
model_name: "tsunami"
model_endpoint: "http://localhost:8090"
temperature: 0.8  # Middle ground: 1.0 sprawls (358-line → truncate → read spiral), 0.6 over-explores (pure read spiral, never writes). 0.8 keeps confidence to commit while reducing variance.
max_tokens: 5120  # Gamedev main.ts hits 450+ lines in one write (frog+cars+logs+state+input+draw loop); 4096 truncated mid-expression. Gamedev prompt is smaller (~2-3K tok), so needed=5120+3000=8120 still fits bucket 8192 (pre-captured). React replica prompts are ~5-6K tok so needed≈10K → bucket 16384 (cold first hit, slower). Worth the speed hit to avoid rewrites.

# --- Eddies (same endpoint) ---
eddy_endpoint: "http://localhost:8090"

# --- Watcher ---
watcher_enabled: false
watcher_model: "tsunami"
watcher_endpoint: "http://localhost:8090"
watcher_interval: 3

# --- Paths ---
workspace_dir: "./workspace"
skills_dir: "./skills"

# --- Behavior ---
max_iterations: 50
tool_timeout: 120
error_escalation_threshold: 3
watcher_interval: 5

# --- Search ---
search_backend: duckduckgo

# --- Browser ---
browser_headless: true
