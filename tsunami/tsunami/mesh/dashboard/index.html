<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaLAN</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a12;--surface:#12121e;--surface2:#1a1a2e;--border:#2a2a3e;--text:#e0e0e0;--muted:#888;--accent:#4a9eff;--green:#00ff88;--red:#ff4444;--yellow:#ffaa00}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh}
.app{max-width:480px;margin:0 auto;padding:16px;padding-bottom:100px}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:20px}
.header h1{font-size:20px;font-weight:700;color:var(--accent)}
.header .status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.header .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.header .dot.offline{background:var(--red)}
.prompt{position:relative;margin-bottom:24px}
.prompt input{width:100%;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.prompt input:focus{border-color:var(--accent)}
.prompt input::placeholder{color:var(--muted)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.stat{background:var(--surface);border-radius:12px;padding:14px}
.stat .label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:4px}
.stat .value{font-size:22px;font-weight:700}
.stat .value.accent{color:var(--accent)}
.stat .value.green{color:var(--green)}
.section{margin-bottom:24px}
.section h2{font-size:13px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
.item{background:var(--surface);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.item .name{font-weight:600;color:var(--accent)}
.item .meta{font-size:12px;color:var(--muted)}
.item .trust{font-size:12px;padding:2px 8px;border-radius:6px;background:var(--surface2)}
.trust-high{color:var(--green)}.trust-med{color:var(--yellow)}.trust-low{color:var(--red)}
.build-log{background:var(--surface);border-radius:10px;padding:12px;font-family:monospace;font-size:12px;color:var(--muted);min-height:60px;max-height:200px;overflow-y:auto;white-space:pre-wrap}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>MegaLAN</h1>
    <div class="status"><div class="dot offline" id="dot"></div><span id="status-text">connecting...</span></div>
  </div>
  <div class="prompt"><input type="text" id="prompt" placeholder="Build something..." autocomplete="off"></div>
  <div class="stats">
    <div class="stat"><div class="label">Credits</div><div class="value accent" id="v-credits">--</div></div>
    <div class="stat"><div class="label">Peers</div><div class="value green" id="v-peers">--</div></div>
    <div class="stat"><div class="label">Capability</div><div class="value" id="v-cap">--</div></div>
    <div class="stat"><div class="label">Apps</div><div class="value" id="v-apps">--</div></div>
  </div>
  <div class="section" id="build-section" style="display:none">
    <h2>Building</h2><div class="build-log" id="build-log"></div>
  </div>
  <div class="section"><h2>Your Apps</h2><div id="apps-list"><div class="empty">No apps yet. Build something.</div></div></div>
  <div class="section"><h2>Neighbors</h2><div id="peers-list"><div class="empty">No peers connected</div></div></div>
</div>
<script>
const API = window.location.origin;

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text) e.textContent = text;
  return e;
}

async function fetchJSON(path) {
  try { const r = await fetch(API + path); return r.ok ? await r.json() : null; }
  catch { return null; }
}

function renderApps(apps, container) {
  container.replaceChildren();
  if (!apps || apps.length === 0) {
    container.appendChild(el('div', 'empty', 'No apps yet. Build something.'));
    return;
  }
  for (const a of apps) {
    const item = el('div', 'item');
    const left = el('div');
    left.appendChild(el('div', 'name', a.name));
    left.appendChild(el('div', 'meta', a.file_count + ' files, ' + (a.total_size / 1024).toFixed(1) + 'KB'));
    item.appendChild(left);
    item.appendChild(el('div', 'meta', '\u2192'));
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => { window.open('/' + a.name + '/', '_blank'); });
    container.appendChild(item);
  }
}

function renderPeers(peers, container) {
  container.replaceChildren();
  if (!peers || peers.length === 0) {
    container.appendChild(el('div', 'empty', 'No peers connected'));
    return;
  }
  for (const p of peers) {
    const item = el('div', 'item');
    const id = el('div', '', p.node_id.slice(0, 12) + '..' + (p.connected ? '' : ' (offline)'));
    id.style.fontFamily = 'monospace';
    id.style.fontSize = '13px';
    const trustPct = (p.trust * 100).toFixed(0) + '%';
    const trustCls = 'trust ' + (p.trust >= 0.7 ? 'trust-high' : p.trust >= 0.4 ? 'trust-med' : 'trust-low');
    item.appendChild(id);
    item.appendChild(el('span', trustCls, trustPct));
    container.appendChild(item);
  }
}

async function refresh() {
  const s = await fetchJSON('/api/status');
  const dot = document.getElementById('dot');
  const st = document.getElementById('status-text');
  if (!s) { dot.className = 'dot offline'; st.textContent = 'offline'; return; }
  dot.className = 'dot';
  st.textContent = s.node_id.slice(0, 8) + '...';
  document.getElementById('v-credits').textContent = s.credits.toFixed(0);
  document.getElementById('v-peers').textContent = s.peers_connected;
  document.getElementById('v-cap').textContent = s.capability.toFixed(0);
  document.getElementById('v-apps').textContent = s.apps_hosted;
  renderApps(await fetchJSON('/api/apps'), document.getElementById('apps-list'));
  renderPeers(await fetchJSON('/api/peers'), document.getElementById('peers-list'));
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const input = e.target;
  const prompt = input.value.trim();
  if (!prompt) return;
  input.value = '';
  input.disabled = true;
  input.placeholder = 'Building...';
  const sec = document.getElementById('build-section');
  const log = document.getElementById('build-log');
  sec.style.display = 'block';
  log.textContent = '> ' + prompt + '\n\nDispatching to mesh...\n';
  setTimeout(() => { input.disabled = false; input.placeholder = 'Build something...'; input.focus(); refresh(); }, 3000);
});

refresh();
setInterval(refresh, 5000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
