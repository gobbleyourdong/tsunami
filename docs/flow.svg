<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .box { fill: #111120; stroke-width: 2; rx: 10; }
      .label { fill: #e8e8f0; font-size: 14px; font-weight: 600; text-anchor: middle; }
      .sub { fill: #8888a0; font-size: 10px; text-anchor: middle; }
      .arrow { stroke-width: 1.5; fill: none; }
      .dim { fill: #555568; font-size: 10px; text-anchor: middle; }
    </style>
    <marker id="arrowhead" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8888a0"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9eff"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4aeeff"/>
    </marker>
    <marker id="arrow-yellow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffd54a"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4aff8a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="560" fill="#0b0b14" rx="12"/>

  <!-- Title -->
  <text x="400" y="36" fill="#e8e8f0" font-size="20" font-weight="700" text-anchor="middle">tsunami</text>
  <text x="400" y="54" fill="#4a9eff" font-size="11" text-anchor="middle">when agents spawn, the tide rises</text>

  <!-- Row 1: User → Wave (9B) -->
  <rect x="40" y="80" width="130" height="55" class="box" stroke="#4a9eff"/>
  <text x="105" y="105" class="label">user</text>
  <text x="105" y="121" class="sub">cli / web ui</text>

  <rect x="230" y="75" width="320" height="65" class="box" stroke="#4a9eff"/>
  <text x="390" y="98" class="label">🌊 wave (9B)</text>
  <text x="390" y="115" fill="#ffd54a" font-size="10" text-anchor="middle" font-family="monospace">analyze → think → dispatch → synthesize</text>
  <text x="390" y="130" class="sub">reasoning · vision · tool selection · tide dispatch</text>

  <rect x="610" y="80" width="150" height="55" class="box" stroke="#4aff8a"/>
  <text x="685" y="105" class="label">llm (local)</text>
  <text x="685" y="121" class="sub">Qwen 9B / 27B</text>

  <!-- Arrows Row 1 -->
  <line x1="170" y1="107" x2="228" y2="107" class="arrow" stroke="#4a9eff" marker-end="url(#arrow-blue)"/>
  <line x1="550" y1="101" x2="608" y2="101" class="arrow" stroke="#4aff8a" marker-end="url(#arrow-green)"/>
  <line x1="608" y1="115" x2="550" y2="115" class="arrow" stroke="#4aff8a" marker-end="url(#arrow-green)"/>

  <!-- Row 2: Wave's Tools -->
  <text x="400" y="175" class="dim">wave tools</text>

  <rect x="50" y="190" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="105" y="211" class="label" font-size="11">file ops</text>
  <text x="105" y="225" class="sub">read / write / edit</text>

  <rect x="180" y="190" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="235" y="211" class="label" font-size="11">shell</text>
  <text x="235" y="225" class="sub">bash exec</text>

  <rect x="310" y="190" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="365" y="211" class="label" font-size="11">search</text>
  <text x="365" y="225" class="sub">web / grep / glob</text>

  <rect x="440" y="190" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="495" y="211" class="label" font-size="11">browser</text>
  <text x="495" y="225" class="sub">playwright</text>

  <rect x="570" y="190" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="625" y="211" class="label" font-size="11">image gen</text>
  <text x="625" y="225" class="sub">SD-Turbo</text>

  <!-- Arrows: Wave → Tools -->
  <line x1="105" y1="140" x2="105" y2="188" class="arrow" stroke="#ffd54a" marker-end="url(#arrow-yellow)"/>
  <line x1="235" y1="140" x2="235" y2="188" class="arrow" stroke="#ffd54a" marker-end="url(#arrow-yellow)"/>
  <line x1="365" y1="140" x2="365" y2="188" class="arrow" stroke="#ffd54a" marker-end="url(#arrow-yellow)"/>
  <line x1="495" y1="140" x2="495" y2="188" class="arrow" stroke="#ffd54a" marker-end="url(#arrow-yellow)"/>
  <line x1="625" y1="140" x2="625" y2="188" class="arrow" stroke="#ffd54a" marker-end="url(#arrow-yellow)"/>

  <!-- Row 3: Tide dispatch → Eddies -->
  <text x="400" y="280" fill="#4aeeff" font-size="12" text-anchor="middle" font-weight="600">↓ tide ↓</text>
  <text x="400" y="295" class="dim">wave dispatches parallel eddies</text>

  <!-- Eddy boxes -->
  <rect x="40" y="310" width="130" height="55" class="box" stroke="#4aeeff"/>
  <text x="105" y="333" fill="#4aeeff" font-size="12" font-weight="600" text-anchor="middle">eddy 1 (2B)</text>
  <text x="105" y="349" class="sub">file_read → reason</text>

  <rect x="195" y="310" width="130" height="55" class="box" stroke="#4aeeff"/>
  <text x="260" y="333" fill="#4aeeff" font-size="12" font-weight="600" text-anchor="middle">eddy 2 (2B)</text>
  <text x="260" y="349" class="sub">shell → analyze</text>

  <rect x="350" y="310" width="130" height="55" class="box" stroke="#4aeeff"/>
  <text x="415" y="333" fill="#4aeeff" font-size="12" font-weight="600" text-anchor="middle">eddy 3 (2B)</text>
  <text x="415" y="349" class="sub">grep → extract</text>

  <rect x="505" y="310" width="130" height="55" class="box" stroke="#4aeeff"/>
  <text x="570" y="333" fill="#4aeeff" font-size="12" font-weight="600" text-anchor="middle">eddy 4 (2B)</text>
  <text x="570" y="349" class="sub">file_read → summarize</text>

  <text x="690" y="340" fill="#4aeeff" font-size="24" text-anchor="middle">···</text>
  <text x="690" y="358" class="sub">up to 32</text>

  <!-- Arrows: dispatch -->
  <line x1="300" y1="260" x2="105" y2="308" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="350" y1="260" x2="260" y2="308" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="430" y1="260" x2="415" y2="308" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="480" y1="260" x2="570" y2="308" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>

  <!-- Row 4: Whirlpool (results converge) -->
  <text x="400" y="405" fill="#4aeeff" font-size="12" text-anchor="middle" font-weight="600">↑ whirlpool ↑</text>
  <text x="400" y="420" class="dim">results converge · wave synthesizes</text>

  <!-- Arrows: eddies → whirlpool -->
  <line x1="105" y1="365" x2="300" y2="395" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="260" y1="365" x2="350" y2="395" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="415" y1="365" x2="430" y2="395" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>
  <line x1="570" y1="365" x2="480" y2="395" class="arrow" stroke="#4aeeff" marker-end="url(#arrow-cyan)"/>

  <!-- Row 5: Output -->
  <rect x="145" y="445" width="130" height="45" class="box" stroke="#4aff8a"/>
  <text x="210" y="467" fill="#4aff8a" font-size="12" font-weight="600" text-anchor="middle">code</text>
  <text x="210" y="481" class="sub">files · projects · apps</text>

  <rect x="295" y="445" width="110" height="45" class="box" stroke="#4a9eff"/>
  <text x="350" y="467" fill="#4a9eff" font-size="12" font-weight="600" text-anchor="middle">analysis</text>
  <text x="350" y="481" class="sub">reports · research</text>

  <rect x="425" y="445" width="110" height="45" class="box" stroke="#ffd54a"/>
  <text x="480" y="467" fill="#ffd54a" font-size="12" font-weight="600" text-anchor="middle">images</text>
  <text x="480" y="481" class="sub">SD-Turbo · &lt;1s</text>

  <rect x="555" y="445" width="130" height="45" class="box" stroke="#ff4a6a"/>
  <text x="620" y="467" fill="#ff4a6a" font-size="12" font-weight="600" text-anchor="middle">answers</text>
  <text x="620" y="481" class="sub">synthesized · cited</text>

  <line x1="400" y1="425" x2="400" y2="443" stroke="#555568" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Sandbox badge -->
  <rect x="700" y="310" width="80" height="55" rx="8" fill="#1a0a0a" stroke="#ff4a4a" stroke-width="1"/>
  <text x="740" y="332" fill="#ff4a4a" font-size="9" font-weight="600" text-anchor="middle">SANDBOX</text>
  <text x="740" y="345" fill="#ff4a4a" font-size="8" text-anchor="middle">allowlist</text>
  <text x="740" y="356" fill="#ff4a4a" font-size="8" text-anchor="middle">read-only</text>

  <!-- Bottom bar -->
  <text x="400" y="530" fill="#555568" font-size="9" text-anchor="middle">10GB full stack · runs on any 12GB GPU · intelligence is the orchestration</text>
  <text x="400" y="548" fill="#333348" font-size="8" text-anchor="middle">607 tests · 20 hardening rounds · 5.9 tasks/sec</text>
</svg>
