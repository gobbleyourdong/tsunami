name: L5 Integration Eval

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Model server endpoint'
        required: true
        default: 'http://localhost:8090'
      timeout:
        description: 'Per-build timeout in seconds'
        required: false
        default: '300'

jobs:
  eval-l5:
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      EVAL_ENDPOINT: ${{ github.event.inputs.endpoint }}
      EVAL_TIMEOUT: ${{ github.event.inputs.timeout }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: pip install httpx pyyaml --quiet 2>/dev/null || true

      - name: Check model server health
        run: curl -sf "$EVAL_ENDPOINT/health" || (echo "Server not running" && exit 1)

      - name: Run L1-L4 quick eval
        run: |
          python training/eval.py \
            --endpoint "$EVAL_ENDPOINT" \
            --quick \
            --output eval_quick_report.json
        continue-on-error: true

      - name: Run L5 integration eval
        run: |
          python training/eval_integration.py \
            --endpoint "$EVAL_ENDPOINT" \
            --timeout "${EVAL_TIMEOUT:-300}" \
            --output eval_l5_report.json

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: |
            eval_quick_report.json
            eval_l5_report.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Eval Results" >> "$GITHUB_STEP_SUMMARY"
          python training/eval_summary.py >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No summary" >> "$GITHUB_STEP_SUMMARY"
